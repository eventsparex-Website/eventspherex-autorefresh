<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#b3d237;--dark:#091d1b;--dark-grad-start:#0d3d39;--dark-grad-end:#091d1b;--whatsapp:#25D366;--radius:16px;--card-max:440px}
html,body{height:100%;overflow-x:hidden}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--dark);color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:16px}

/* Loading skeleton */
.skeleton-wrapper{width:100%;max-width:var(--card-max);margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:18px;padding:48px 24px}
.skeleton{background:rgba(255,255,255,.06);border-radius:8px;position:relative;overflow:hidden}
.skeleton::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.04),transparent);animation:shimmer 1.8s infinite}
@keyframes shimmer{to{left:100%}}
.sk-avatar{width:130px;height:130px;border-radius:50%}
.sk-name{width:200px;height:28px}
.sk-title{width:260px;height:18px}
.sk-line{width:80%;height:1px;background:rgba(255,255,255,.1)}
.sk-icons{width:220px;height:44px;border-radius:22px}
.sk-contact{width:240px;height:16px}
.sk-bio{width:300px;height:48px}
.sk-qr{width:160px;height:160px;border-radius:12px}
.sk-btn{width:260px;height:52px;border-radius:26px}

/* Card container */
.card-page{width:100%;max-width:var(--card-max);margin:0 auto;display:none;flex-direction:column;align-items:center;animation:fadeUp .6s ease;padding:32px 16px}

@media(max-width:480px){
  body{align-items:flex-start;padding:0}
  .card-page{padding:40px 16px 32px;min-height:100vh;min-height:100dvh;justify-content:flex-start}
  .card-name{font-size:24px}
  .card-title-company{font-size:13px}
  .contact-icon-btn{width:42px;height:42px}
  .save-btn{padding:12px 28px;font-size:14px}
  .card-bio{font-size:13px}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

/* Profile photo */
.card-photo-wrap{position:relative;margin-bottom:20px}
.card-photo{width:130px;height:130px;border-radius:50%;object-fit:cover;border:4px solid var(--theme-color, var(--accent));box-shadow:0 8px 32px rgba(0,0,0,.3)}
.card-photo-placeholder{width:130px;height:130px;border-radius:50%;border:4px solid var(--theme-color, var(--accent));background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:700;color:var(--theme-color, var(--accent));box-shadow:0 8px 32px rgba(0,0,0,.3)}

/* Name and title */
.card-name{font-size:28px;font-weight:800;letter-spacing:-.5px;text-align:center;line-height:1.2;margin-bottom:6px}
.card-title-company{font-size:15px;font-weight:400;opacity:.75;text-align:center;margin-bottom:20px}

/* Divider */
.card-divider{width:60px;height:2px;border-radius:1px;margin-bottom:22px;opacity:.6}

/* Contact icons row */
.contact-icons{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.contact-icon-btn{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s,box-shadow .2s;cursor:pointer;border:none;outline:none}
.contact-icon-btn:hover{transform:scale(1.1);box-shadow:0 4px 20px rgba(0,0,0,.25)}
.contact-icon-btn:active{transform:scale(.95)}
.contact-icon-btn svg{width:20px;height:20px}
.icon-email{background:var(--icon-bg, rgba(255,255,255,.12))}
.icon-phone{background:var(--icon-bg, rgba(255,255,255,.12))}
.icon-website{background:var(--icon-bg, rgba(255,255,255,.12))}
.icon-whatsapp{background:var(--whatsapp)}

/* Contact text */
.contact-texts{display:flex;flex-direction:column;gap:8px;margin-bottom:22px;align-items:center}
.contact-text-row{display:flex;align-items:center;gap:8px;font-size:13px;opacity:.7}
.contact-text-row a{color:inherit;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
.contact-text-row a:hover{border-bottom-color:currentColor}

/* Social icons */
.social-icons{display:flex;gap:14px;margin-bottom:10px;flex-wrap:wrap;justify-content:center}
.social-icon-btn{width:42px;height:42px;border-radius:50%;background:var(--icon-bg, rgba(255,255,255,.08));display:flex;align-items:center;justify-content:center;text-decoration:none;transition:transform .2s,background .2s;cursor:pointer}
.social-icon-btn:hover{transform:scale(1.1);background:rgba(255,255,255,.15)}
.social-icon-btn:active{transform:scale(.95)}
.social-icon-btn svg{width:18px;height:18px}

/* Social handles */
.social-handles{display:flex;flex-direction:column;gap:4px;margin-bottom:22px;align-items:center}
.social-handle{font-size:12px;opacity:.5}
.social-handle a{color:inherit;text-decoration:none}

/* Bio */
.card-bio{font-size:14px;font-style:italic;line-height:1.6;text-align:center;opacity:.65;max-width:360px;margin-bottom:28px;padding:0 12px}

/* QR Code */
.qr-wrap{background:#fff;border-radius:12px;padding:10px;margin-bottom:24px;box-shadow:0 4px 24px rgba(0,0,0,.2)}
.qr-wrap canvas,.qr-wrap img{display:block;border-radius:4px}

/* Save contact button */
.save-btn{display:inline-flex;align-items:center;gap:10px;padding:14px 36px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;border:none;text-decoration:none;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,.25)}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.save-btn:active{transform:translateY(0)}
.save-btn svg{width:18px;height:18px}

/* Watermark */
.watermark{margin-top:32px;margin-bottom:8px;font-size:11px;opacity:.35;text-align:center}
.watermark a{color:inherit;text-decoration:none;border-bottom:1px dotted rgba(255,255,255,.2)}
.watermark a:hover{opacity:1}

/* Error state */
.error-state{display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 24px;max-width:var(--card-max);margin:0 auto;animation:fadeUp .6s ease}
.error-icon{width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;margin-bottom:24px}
.error-icon svg{width:36px;height:36px;opacity:.4}
.error-title{font-size:24px;font-weight:700;margin-bottom:10px}
.error-msg{font-size:14px;opacity:.5;line-height:1.6;margin-bottom:28px;max-width:300px}
.error-cta{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:26px;background:var(--accent);color:var(--dark);font-size:14px;font-weight:600;text-decoration:none;transition:transform .2s}
.error-cta:hover{transform:translateY(-2px)}
.error-home{margin-top:16px;font-size:13px;opacity:.4}
.error-home a{color:var(--accent);text-decoration:none}

/* Style variants — backgrounds set via JS applyStyle() for accurate theme colors */
body.style-classic{}
body.style-modern{}
body.style-minimal{background:#f8f9fa;color:#1a1a1a}
body.style-minimal .skeleton{background:rgba(0,0,0,.06)}
body.style-minimal .skeleton::after{background:linear-gradient(90deg,transparent,rgba(0,0,0,.03),transparent)}
body.style-minimal .card-divider{background:#1a1a1a}
body.style-minimal .icon-email,body.style-minimal .icon-phone,body.style-minimal .icon-website{background:var(--icon-bg, rgba(0,0,0,.07))}
body.style-minimal .icon-email svg,body.style-minimal .icon-phone svg,body.style-minimal .icon-website svg{color:#1a1a1a}
body.style-minimal .social-icon-btn{background:var(--icon-bg, rgba(0,0,0,.06))}
body.style-minimal .social-icon-btn svg{color:#1a1a1a}
body.style-minimal .save-btn{color:#fff}
body.style-minimal .watermark{color:#1a1a1a}
body.style-minimal .watermark a{border-bottom-color:rgba(0,0,0,.15)}
body.style-minimal .contact-icon-btn svg{color:#1a1a1a}
body.style-minimal .social-icon-btn svg{color:#1a1a1a}

/* Responsive */
@media(max-width:480px){
.card-name{font-size:24px}
.card-title-company{font-size:14px}
.card-photo,.card-photo-placeholder{width:110px;height:110px}
.card-photo-placeholder{font-size:40px}
.save-btn{padding:12px 28px;font-size:14px}
body{padding:12px}
}
</style>
</head>

<script>
(function(){
"use strict";

var _SB_URL="https://zusathnzwlaprxyhnmnb.supabase.co";
var _SB_KEY="sb_publishable_NBGrT_QXMK7VRm7jAuzreQ_tQS4omXT";
var _sb=window.supabase.createClient(_SB_URL,_SB_KEY);

function getSlug(){
var p=window.location.pathname;
var parts=p.replace(/\/+$/,"").split("/");
var s=parts[parts.length-1];
if(s&&s!=="card"&&s!=="card.html")return s;
var params=new URLSearchParams(window.location.search);
return params.get("slug")||null;
}

function showError(){
document.getElementById("loadingState").style.display="none";
document.getElementById("errorState").style.display="flex";
}

function escapeHtml(t){
if(!t)return"";
var d=document.createElement("div");
d.appendChild(document.createTextNode(t));
return d.innerHTML;
}

function hexToRgb(hex){
var r=0,g=0,b=0;
hex=hex.replace("#","");
if(hex.length===3){hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];}
r=parseInt(hex.substring(0,2),16);
g=parseInt(hex.substring(2,4),16);
b=parseInt(hex.substring(4,6),16);
return r+","+g+","+b;
}

function applyStyle(card){
var body=document.body;
var style=card.card_style||"classic";
body.classList.add("style-"+style);
var tc=card.color_theme||"#b3d237";
body.style.setProperty("--theme-color",tc);
body.style.setProperty("--accent",tc);
var rgb=hexToRgb(tc);
// Icon backgrounds with theme color tint
if(style==="minimal"){
body.style.setProperty("--icon-bg","rgba("+rgb+",0.1)");
body.style.background="#f8f9fa";
body.style.color="#1a1a1a";
}else if(style==="modern"){
body.style.setProperty("--icon-bg","rgba("+rgb+",0.15)");
body.style.background="linear-gradient(160deg,"+tc+",#091d1b)";
}else{
// classic
body.style.setProperty("--icon-bg","rgba("+rgb+",0.15)");
body.style.background="linear-gradient(160deg,#0d3d39,#091d1b)";
}
}

function getThemeColor(card){
if(card.color_theme)return card.color_theme;
return"#b3d237";
}

function getInitials(name){
if(!name)return"?";
var parts=name.trim().split(/\s+/);
if(parts.length>=2)return(parts[0][0]+parts[parts.length-1][0]).toUpperCase();
return parts[0][0].toUpperCase();
}

function buildVCard(card){
var lines=[];
lines.push("BEGIN:VCARD");
lines.push("VERSION:3.0");
var name=card.name||"";
var parts=name.trim().split(/\s+/);
var first=parts[0]||"";
var last=parts.slice(1).join(" ")||"";
lines.push("FN:"+name);
lines.push("N:"+last+";"+first+";;;");
if(card.title)lines.push("TITLE:"+card.title);
if(card.company)lines.push("ORG:"+card.company);
if(card.phone)lines.push("TEL;TYPE=CELL:"+card.phone);
if(card.email)lines.push("EMAIL:"+card.email);
if(card.website)lines.push("URL:"+card.website);
if(card.plan&&card.plan!=="free"){
if(card.bio)lines.push("NOTE:"+card.bio.replace(/\n/g," "));
if(card.photo_url)lines.push("PHOTO;TYPE=URI:"+card.photo_url);
if(card.linkedin)lines.push("X-SOCIALPROFILE;TYPE=linkedin:"+card.linkedin);
if(card.instagram)lines.push("X-SOCIALPROFILE;TYPE=instagram:"+card.instagram);
if(card.twitter)lines.push("X-SOCIALPROFILE;TYPE=twitter:"+card.twitter);
}
lines.push("END:VCARD");
return lines.join("\r\n");
}

function buildVCardFree(card){
var lines=[];
lines.push("BEGIN:VCARD");
lines.push("VERSION:3.0");
var name=card.name||"";
var parts=name.trim().split(/\s+/);
var first=parts[0]||"";
var last=parts.slice(1).join(" ")||"";
lines.push("FN:"+name);
lines.push("N:"+last+";"+first+";;;");
if(card.email)lines.push("EMAIL:"+card.email);
if(card.phone)lines.push("TEL;TYPE=CELL:"+card.phone);
lines.push("END:VCARD");
return lines.join("\r\n");
}

function downloadVCard(card){
var vcf=(card.plan&&card.plan!=="free")?buildVCard(card):buildVCardFree(card);
var blob=new Blob([vcf],{type:"text/vcard;charset=utf-8"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;
a.download=(card.name||"contact").replace(/\s+/g,"-").toLowerCase()+".vcf";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);
URL.revokeObjectURL(url);
}

function generateQR(card){
var vcf=(card.plan&&card.plan!=="free")?buildVCard(card):buildVCardFree(card);
var qr=qrcode(0,"M");
qr.addData(vcf);
qr.make();
var size=160;
var cellSize=Math.floor(size/qr.getModuleCount());
var img=qr.createImgTag(cellSize,0);
return img;
}

function formatPhone(phone){
if(!phone)return"";
return phone;
}

function formatWebsite(url){
if(!url)return"";
return url.replace(/^https?:\/\//,"").replace(/\/$/,"");
}

function ensureUrl(url){
if(!url)return"#";
if(url.match(/^https?:\/\//))return url;
return"https://"+url;
}

function formatSocialHandle(url,platform){
if(!url)return"";
var clean=url.replace(/^https?:\/\/(www\.)?/,"").replace(/\/$/,"");
if(platform==="linkedin")return clean.replace(/linkedin\.com\/in\//,"@").replace(/linkedin\.com\//,"");
if(platform==="instagram")return"@"+clean.replace(/instagram\.com\//,"");
if(platform==="twitter")return"@"+clean.replace(/x\.com\//,"").replace(/twitter\.com\//,"");
return clean;
}

function renderCard(card){
var themeColor=getThemeColor(card);
var isDark=card.card_style!=="minimal";
var iconColor=isDark?"#fff":"#1a1a1a";
var html="";

// Photo
if(card.photo_url){
html+='<div class="card-photo-wrap"><img class="card-photo" src="'+escapeHtml(card.photo_url)+'" alt="'+escapeHtml(card.name)+'" onerror="this.parentElement.innerHTML=\'<div class=card-photo-placeholder>'+getInitials(card.name)+'</div>\'"></div>';
}else{
html+='<div class="card-photo-wrap"><div class="card-photo-placeholder" style="border-color:'+themeColor+'">'+getInitials(card.name)+'</div></div>';
}

// Name
html+='<h1 class="card-name">'+escapeHtml(card.name)+'</h1>';

// Title | Company
var titleParts=[];
if(card.title)titleParts.push(escapeHtml(card.title));
if(card.company)titleParts.push(escapeHtml(card.company));
if(titleParts.length){
html+='<p class="card-title-company">'+titleParts.join(" | ")+'</p>';
}

// Divider
html+='<div class="card-divider" style="background:'+themeColor+'"></div>';

// Contact icons row
var hasContact=card.email||card.phone||card.website||card.whatsapp;
if(hasContact){
html+='<div class="contact-icons">';
if(card.email){
html+='<a class="contact-icon-btn icon-email" href="mailto:'+escapeHtml(card.email)+'" title="Email"><svg fill="none" viewBox="0 0 24 24" stroke="'+iconColor+'" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg></a>';
}
if(card.phone){
html+='<a class="contact-icon-btn icon-phone" href="tel:'+escapeHtml(card.phone)+'" title="Call"><svg fill="none" viewBox="0 0 24 24" stroke="'+iconColor+'" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg></a>';
}
if(card.website){
html+='<a class="contact-icon-btn icon-website" href="'+ensureUrl(escapeHtml(card.website))+'" target="_blank" rel="noopener" title="Website"><svg fill="none" viewBox="0 0 24 24" stroke="'+iconColor+'" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5a17.92 17.92 0 01-8.716-2.247m0 0A9 9 0 013 12c0-.778.099-1.533.284-2.253"/></svg></a>';
}

async function init(){
var slug=getSlug();
if(!slug){showError();return;}

try{
// Try exact slug match first
var res=await _sb.from("cards").select("*").eq("slug",slug).eq("is_active",true).single();
// If no exact match, try partial match (slug starts with entered value)
if(res.error||!res.data){
var res2=await _sb.from("cards").select("*").like("slug",slug+"-%").eq("is_active",true).limit(1).single();
if(res2.error||!res2.data){showError();return;}
res=res2;
}
var card=res.data;
// Map database column names to card properties
card.name=card.full_name||"";
card.title=card.job_title||"";
card.company=card.company||"";
card.phone=card.phone||"";
card.email=card.email||"";
card.website=card.website||"";
card.whatsapp=card.whatsapp||"";
card.linkedin=card.linkedin||"";
card.instagram=card.instagram||"";
card.twitter=card.twitter||"";
card.bio=card.bio||"";
// Get user plan from profiles and check expiry
var userPlan="free";
try{
var profileRes=await _sb.from("profiles").select("plan,plan_expires_at").eq("id",card.user_id).single();
if(profileRes.data&&profileRes.data.plan){
userPlan=profileRes.data.plan;
var planExpiry=profileRes.data.plan_expires_at;
if(userPlan!=="free"&&planExpiry){
  var expiryDate=new Date(planExpiry);
  if(expiryDate<=new Date()) userPlan="free";
}
}
}catch(e){}
// If profiles table has no data, detect plan from card features
// Pro users have social links, bio, website, whatsapp, custom colors
if(userPlan==="free"){
var hasProFeatures=(card.linkedin||card.instagram||card.twitter||card.bio||card.website||card.whatsapp);
var hasCustomColor=(card.color_theme&&card.color_theme!=="#b3d237");
var hasCustomStyle=(card.card_style&&card.card_style!=="classic");
if(hasProFeatures||hasCustomColor||hasCustomStyle) userPlan="pro";
}
card.plan=userPlan;

// Apply style
applyStyle(card);

// Update meta tags
document.title=card.name+(card.title?" - "+card.title:"")+" | EventSphereX";
var metaDesc=card.bio||("Digital business card for "+card.name);
document.querySelector('meta[name="description"]').setAttribute("content",metaDesc);
document.querySelector('meta[property="og:title"]').setAttribute("content",card.name+(card.title&&card.company?" - "+card.title+" at "+card.company:""));
document.querySelector('meta[property="og:description"]').setAttribute("content",metaDesc);
if(card.photo_url)document.querySelector('meta[property="og:image"]').setAttribute("content",card.photo_url);
document.querySelector('meta[property="og:url"]').setAttribute("content",window.location.href);

// Render
var container=document.getElementById("cardPage");
container.innerHTML=renderCard(card);
document.getElementById("loadingState").style.display="none";
container.style.display="flex";

// QR Code
try{
var qrHtml=generateQR(card);
document.getElementById("qrContainer").innerHTML=qrHtml;
}catch(e){
document.getElementById("qrContainer").style.display="none";
}

// Save button
document.getElementById("saveBtn").addEventListener("click",function(){
downloadVCard(card);
});

// Track view
try{
await _sb.rpc("increment_view_count",{p_card_id:card.id});
}catch(e){}

}catch(err){
showError();
}
}

// Code protection
document.addEventListener("contextmenu",function(e){e.preventDefault()});
document.addEventListener("keydown",function(e){
if(e.key==="F12")e.preventDefault();
if(e.ctrlKey&&e.key==="u")e.preventDefault();
if(e.ctrlKey&&e.key==="s")e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key==="I")e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key==="J")e.preventDefault();
if(e.ctrlKey&&e.shiftKey&&e.key==="C")e.preventDefault();
});

init();
})();
</script>
