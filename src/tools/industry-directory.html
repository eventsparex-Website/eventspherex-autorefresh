function stars(r){return '★'.repeat(Math.floor(r))+(r%1>=0.5?'½':'');}

function render(list){
  const grid=document.getElementById('grid');
  document.getElementById('count').textContent=`Showing ${list.length} of ${companies.length} companies`;
  if(!list.length){grid.innerHTML='<div style="text-align:center;padding:40px;color:#6a7a6a;grid-column:1/-1">No companies found.</div>';return;}
  grid.innerHTML=list.map(c=>`<div class="company-card ${c.featured?'featured':''}">
    ${c.featured?'<div class="featured-badge">FEATURED</div>':''}
    <h3>${c.name}</h3>
    <div class="company-meta">
      <span class="cat-badge ${catBadge[c.cat]||'cat-em'}">${c.cat}</span>
      <span class="city-tag">📍 ${c.city}</span>
    </div>
    <div class="rating">${stars(c.rating)} ${c.rating}</div>
    <div class="company-desc">${c.desc}</div>
    <div class="company-phone">📞 ${c.phone}</div>
    <div class="card-btns">
      <a class="card-btn" href="tel:${c.phone.replace(/\s/g,'')}">Call</a>
      <a class="card-btn" href="https://${c.web}" target="_blank">Website</a>
    </div>
  </div>`).join('');
}

function filter(){
  const s=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('fCat').value;
  const city=document.getElementById('fCity').value;
  const sort=document.getElementById('sortBy').value;
  let list=companies.filter(c=>{
    if(s&&!c.name.toLowerCase().includes(s)&&!c.desc.toLowerCase().includes(s))return false;
    if(cat&&c.cat!==cat)return false;
    if(city&&c.city!==city)return false;
    return true;
  });
  if(sort==='name')list.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='rating')list.sort((a,b)=>b.rating-a.rating);
  else if(sort==='city')list.sort((a,b)=>a.city.localeCompare(b.city));
  else list.sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)||b.rating-a.rating);
  render(list);
}

function submitListing(){
  const name=document.getElementById('lName').value;
  if(!name){alert('Please enter company name');return;}
  const subs=JSON.parse(localStorage.getItem('esx_dir_subs')||'[]');
  subs.push({name,cat:document.getElementById('lCat').value,city:document.getElementById('lCity').value,phone:document.getElementById('lPhone').value,email:document.getElementById('lEmail').value,web:document.getElementById('lWeb').value,desc:document.getElementById('lDesc').value,date:new Date().toISOString()});
  localStorage.setItem('esx_dir_subs',JSON.stringify(subs));
  document.getElementById('success').style.display='block';
  setTimeout(()=>{document.getElementById('modal').classList.remove('show');document.getElementById('success').style.display='none';},3000);
}
