.form-group label{font-size:13px;color:#666;text-transform:uppercase;letter-spacing:.5px}
.form-group select,.form-group input{padding:12px 16px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#091d1b;font-size:15px;outline:none;transition:.3s}

.btn{width:100%;padding:16px;border:none;border-radius:12px;background:#091d1b;color:#b3d237;font-size:18px;font-weight:700;cursor:pointer;transition:.3s;margin-top:20px}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15)}
.checklist{display:none}
.checklist.show{display:block}
.progress-bar{background:#e8e8e8;border-radius:20px;height:24px;overflow:hidden;margin-bottom:20px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,#b3d237,#a8bf20);border-radius:20px;transition:width .5s ease;min-width:0}
.progress-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;font-weight:600;color:#091d1b;z-index:1}
.timeline-section{margin-bottom:24px}
.timeline-header{display:flex;align-items:center;gap:12px;padding:14px 18px;background:#091d1b;border-radius:16px;margin-bottom:12px;cursor:pointer;transition:.3s}
.timeline-header:hover{transform:translateY(-2px);box-shadow:0 6px 15px rgba(0,0,0,.1)}
.timeline-header .dot{width:12px;height:12px;border-radius:50%;background:#b3d237;flex-shrink:0}
.timeline-header h3{font-size:16px;flex:1;color:#fff}
.timeline-header .count{font-size:13px;color:#b3d237}
.task-list{padding-left:20px}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:14px;margin-bottom:8px;background:#091d1b;transition:.3s;cursor:pointer;color:#eee;border:none}
.task-item:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.1)}
.task-item.done{opacity:.5}
.task-item.done .task-text{text-decoration:line-through}
.task-check{width:22px;height:22px;border-radius:6px;border:2px solid #555;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.3s;margin-top:2px}
.task-item.done .task-check{background:#b3d237;border-color:#b3d237;color:#091d1b}
.task-text{font-size:14px;line-height:1.5}
.task-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin-top:4px}

.tag-logistics{background:rgba(255,179,71,.15);color:#ffb347}

const tagClasses = { venue:'tag-venue', marketing:'tag-marketing', logistics:'tag-logistics', production:'tag-production', admin:'tag-admin', catering:'tag-catering' };
let allTasks = [];

function generateChecklist() {
  const type = document.getElementById('eventType').value;
  const name = document.getElementById('eventName').value || 'My Event';
  const data = checklists[type];
  allTasks = [];
  let taskId = 0;

  // Load saved progress
  const saved = JSON.parse(localStorage.getItem('esx_checklist_' + type) || '{}');

  let html = '';
  data.forEach(section => {
    html += `<div class="timeline-section"><div class="timeline-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'"><div class="dot"></div><h3>${section.phase}</h3><span class="count">${section.tasks.length} tasks</span></div><div class="task-list">`;
    section.tasks.forEach(task => {
      const done = saved[taskId] || false;
      allTasks.push({ id: taskId, done });
      html += `<div class="task-item ${done?'done':''}" id="task-${taskId}" onclick="toggleTask(${taskId},'${type}')">
        <div class="task-check">${done?'✓':''}</div>
        <div><div class="task-text">${task.text}</div><span class="task-tag ${tagClasses[task.tag]||''}">${task.tag}</span></div>
      </div>`;
      taskId++;
    });
    html += '</div></div>';
  });

  document.getElementById('checklistTitle').textContent = name + ' — Checklist';
  document.getElementById('checklistContent').innerHTML = html;
  document.getElementById('checklist').classList.add('show');
  updateProgress(type);
  document.getElementById('checklist').scrollIntoView({ behavior: 'smooth' });
}

function toggleTask(id, type) {
  const task = allTasks.find(t => t.id === id);
  task.done = !task.done;
  const el = document.getElementById('task-' + id);
  el.classList.toggle('done');
  el.querySelector('.task-check').textContent = task.done ? '✓' : '';

  // Save progress
  const saved = {};
  allTasks.forEach(t => { if (t.done) saved[t.id] = true; });
  localStorage.setItem('esx_checklist_' + type, JSON.stringify(saved));
  updateProgress(type);
}

function updateProgress() {
  const total = allTasks.length;
  const done = allTasks.filter(t => t.done).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} of ${total} completed (${pct}%)`;
}

function shareWA() {
  const name = document.getElementById('eventName').value || 'My Event';
  const total = allTasks.length;
  const done = allTasks.filter(t => t.done).length;
  const text = `📋 *${name} — Event Checklist*\n\n✅ ${done} of ${total} tasks completed\n\nGenerated on EventSphereX\nhttps://eventspherex.com`;
  window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
}

function resetAll() {
  document.getElementById('checklist').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
