*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f9fafb;color:#091d1b;min-height:100vh}
.container{max-width:1000px;margin:0 auto;padding:20px}
.brand{text-align:center;padding:30px 0 20px}
.brand h1{font-size:28px;color:#091d1b;letter-spacing:1px}
.brand p{color:#666;font-size:14px;margin-top:5px}
.card{background:#fff;border-radius:16px;padding:24px;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06);border-top:4px solid #b3d237}
.filters{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:center}
.filters select,.filters input{padding:10px 14px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#091d1b;font-size:14px;outline:none}
.filters select:focus,.filters input:focus{border-color:#b3d237;box-shadow:0 0 0 3px rgba(197,217,58,.25)}
.filters input[type="text"]{flex:1;min-width:200px}
.view-toggle{display:flex;gap:8px;margin-left:auto}
.view-btn{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#666;cursor:pointer;font-size:13px;transition:.3s}
.view-btn.active{background:#091d1b;color:#b3d237;border-color:#091d1b;font-weight:700}
.count{color:#666;font-size:14px;margin-bottom:16px}
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
@media(max-width:600px){.events-grid{grid-template-columns:1fr}}
.event-card{background:#091d1b;border-radius:20px;padding:22px;transition:.3s;border:none}
.event-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.15)}
.event-date{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.event-date .month{background:#b3d237;color:#091d1b;padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;text-transform:uppercase}
.event-date .days{color:#999;font-size:13px}
.event-card h3{font-size:17px;margin-bottom:8px;line-height:1.3;color:#fff}
.event-card .location{color:#aaa;font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:4px}
.event-card .desc{color:#999;font-size:13px;line-height:1.5;margin-bottom:10px}
.cat-tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
.cat-exhibition{background:rgba(90,184,255,.15);color:#5ab8ff}
.cat-conference{background:rgba(196,122,255,.15);color:#c47aff}
.cat-tradeshow{background:rgba(255,179,71,.15);color:#ffb347}
.cat-summit{background:rgba(71,255,140,.15);color:#47ff8c}
.cat-award{background:rgba(255,122,168,.15);color:#ff7aa8}
.cat-fair{background:rgba(197,217,58,.15);color:#b3d237}
.submit-section{background:#091d1b;border-radius:12px;padding:24px;margin-top:20px;text-align:center}
.submit-section h3{color:#b3d237;margin-bottom:10px}
.submit-section p{color:#aaa;font-size:14px;margin-bottom:16px}
.submit-btn{padding:12px 30px;border:none;border-radius:10px;background:#b3d237;color:#091d1b;font-size:15px;font-weight:700;cursor:pointer;transition:.3s}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(197,217,58,.4)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-content{background:#fff;border-radius:16px;padding:30px;max-width:500px;width:90%;max-height:80vh;overflow-y:auto;border-top:4px solid #b3d237}
.modal-content h2{color:#091d1b;margin-bottom:20px}
.modal-content .form-group{margin-bottom:14px}
.modal-content label{display:block;font-size:13px;color:#666;margin-bottom:4px}
.modal-content input,.modal-content textarea,.modal-content select{width:100%;padding:10px 14px;border-radius:8px;border:1px solid #ddd;background:#fff;color:#091d1b;font-size:14px;outline:none}
.modal-content input:focus,.modal-content textarea:focus,.modal-content select:focus{border-color:#b3d237;box-shadow:0 0 0 3px rgba(197,217,58,.2)}
.modal-content textarea{height:80px;resize:vertical}
.modal-btns{display:flex;gap:10px;margin-top:16px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;border:none;font-weight:600}
.modal-btns .btn-submit{background:#b3d237;color:#091d1b}

.success-msg{background:#f0fde8;border:2px solid #b3d237;padding:16px;border-radius:10px;color:#091d1b;text-align:center;display:none;margin-top:12px}
.footer{text-align:center;padding:30px 0;color:#999;font-size:13px}

.list-view .events-grid{grid-template-columns:1fr}
.list-view .event-card{display:flex;align-items:center;gap:20px;padding:16px 20px}
.list-view .event-card h3{font-size:15px;margin-bottom:4px}
@media(max-width:600px){.list-view .event-card{flex-direction:column;align-items:flex-start}}
</style>

events.sort((a,b) => new Date(a.start) - new Date(b.start));

function renderEvents(list) {
  const container = document.getElementById('eventsContainer');
  if (list.length === 0) {
    container.innerHTML = '<div style="text-align:center;padding:40px;color:#6a7a6a">No events found. Try different filters.</div>';
    document.getElementById('count').textContent = '0 events found';
    return;
  }
  document.getElementById('count').textContent = `Showing ${list.length} events`;
  container.innerHTML = list.map(e => {
    const s = new Date(e.start);
    const en = new Date(e.end);
    const catKey = Object.keys(catClass).find(k => e.cat.includes(k)) || '';
    return `<div class="event-card">
      <div class="event-date">
        <span class="month">${months[s.getMonth()]}</span>
        <span class="days">${s.getDate()}${e.start!==e.end?' - '+en.getDate()+' '+months[en.getMonth()]:''}, 2026</span>
      </div>
      <h3>${e.name}</h3>
      <div class="location">📍 ${e.venue}, ${e.city}</div>
      <div class="desc">${e.desc}</div>
      <span class="cat-tag ${catClass[catKey]||'cat-exhibition'}">${e.cat}</span>
    </div>`;
  }).join('');
}

function filterEvents() {
  const search = document.getElementById('search').value.toLowerCase();
  const city = document.getElementById('filterCity').value;
  const cat = document.getElementById('filterCat').value;
  const month = document.getElementById('filterMonth').value;

  const filtered = events.filter(e => {
    if (search && !e.name.toLowerCase().includes(search) && !e.desc.toLowerCase().includes(search)) return false;
    if (city && e.city !== city) return false;
    if (cat && !e.cat.includes(cat)) return false;
    if (month && (new Date(e.start).getMonth() + 1) !== parseInt(month)) return false;
    return true;
  });
  renderEvents(filtered);
}

function setView(view, btn) {
  document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = document.getElementById('eventsContainer').parentElement;
  container.classList.toggle('list-view', view === 'list');
}

function submitEvent() {
  const name = document.getElementById('subName').value;
  if (!name) { alert('Please enter event name'); return; }
  // Save to localStorage
  const submissions = JSON.parse(localStorage.getItem('esx_submissions') || '[]');
  submissions.push({
    name, cat: document.getElementById('subCat').value,
    start: document.getElementById('subStart').value,
    end: document.getElementById('subEnd').value,
    city: document.getElementById('subCity').value,
    venue: document.getElementById('subVenue').value,
    desc: document.getElementById('subDesc').value,
    email: document.getElementById('subEmail').value,
    date: new Date().toISOString()
  });
  localStorage.setItem('esx_submissions', JSON.stringify(submissions));
  document.getElementById('successMsg').style.display = 'block';
  setTimeout(() => {
    document.getElementById('modal').classList.remove('show');
    document.getElementById('successMsg').style.display = 'none';
  }, 3000);
}

renderEvents(events);
</script>
