<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px;
  height: 630px;
  background: linear-gradient(135deg, #091d1b 0%, #0d3d39 50%, #091d1b 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
  position: relative;
  overflow: hidden;
}

/* Subtle grid pattern */
body::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(179,210,55,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(179,210,55,.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Accent glow */
.glow {
  position: absolute;
  width: 400px;
  height: 400px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(179,210,55,.12), transparent 70%);
  top: -100px;
  right: -100px;
}
.glow2 {
  position: absolute;
  width: 300px;
  height: 300px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(179,210,55,.08), transparent 70%);
  bottom: -80px;
  left: -80px;
}

/* Accent bar top */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, #b3d237, #8cb82b, #b3d237);
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 0 80px;
}

.logo-text {
  font-size: 72px;
  font-weight: 800;
  color: #fff;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.logo-text span {
  color: #b3d237;
}

.x-mark {
  display: inline-block;
  position: relative;
}
.x-mark::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  right: 0;
  height: 3px;
  background: #b3d237;
  border-radius: 2px;
}

.tagline {
  font-size: 24px;
  color: rgba(255,255,255,.7);
  font-weight: 400;
  margin-top: 20px;
  letter-spacing: 1px;
}

.divider {
  width: 80px;
  height: 3px;
  background: #b3d237;
  margin: 28px auto;
  border-radius: 2px;
}

.stats {
  display: flex;
  gap: 48px;
  justify-content: center;
  margin-top: 12px;
}
.stat {
  text-align: center;
}
.stat-num {
  font-size: 32px;
  font-weight: 800;
  color: #b3d237;
}
.stat-label {
  font-size: 13px;
  color: rgba(255,255,255,.5);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.url {
  position: absolute;
  bottom: 32px;
  font-size: 16px;
  color: rgba(255,255,255,.4);
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="content">
    <div class="logo-text">Event<span>Sphere</span><span class="x-mark">X</span></div>
    <div class="tagline">India's Event Industry Portal</div>
    <div class="divider"></div>
    <div style="font-size:17px;color:rgba(255,255,255,.5);margin-bottom:24px">News &bull; Insights &bull; Tools &bull; Directory &bull; Jobs</div>
    <div class="stats">
      <div class="stat"><div class="stat-num">200+</div><div class="stat-label">Articles</div></div>
      <div class="stat"><div class="stat-num">50+</div><div class="stat-label">Cities</div></div>
      <div class="stat"><div class="stat-num">5</div><div class="stat-label">Free Tools</div></div>
      <div class="stat"><div class="stat-num">18</div><div class="stat-label">Categories</div></div>
    </div>
  </div>

  <div class="url">eventspherex.com</div>
</body>
</html>
