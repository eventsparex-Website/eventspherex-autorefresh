name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Fetch live data
        run: |
          node scripts/fetch-news.js || true
          node scripts/fetch-jobs.js || true
          node scripts/fetch-tenders.js || true

      - name: Build site with Eleventy
        run: npx @11ty/eleventy

      - name: Build search index
        run: npx pagefind --site _site

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 65002 157.173.216.223 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Hostinger
        run: |
          rsync -avz --delete -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            _site/ u410945448@157.173.216.223:~/domains/eventspherex.com/public_html/ \
            --exclude='wp-content' \
            --exclude='wp-admin' \
            --exclude='wp-includes' \
            --exclude='*.php.wp-backup' \
            --exclude='.htaccess.wp-backup' \
            --exclude='staged-posts' \
            --exclude='staged-pages' \
            --exclude='backups' \
            --exclude='scripts' \
            --exclude='publish-scheduled.sh' \
            --exclude='publish-log.txt'
